name: Build & Push

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag override (leave empty to auto-detect from ironclaw version)'
        required: false
        type: string
        default: ''
      ironclaw_image:
        description: 'Source ironclaw image (for binary)'
        required: false
        type: string
        default: nearaidev/ironclaw:latest
      bake:
        description: 'Bake sandbox image into inner Docker'
        required: false
        type: boolean
        default: true
  push:
    branches: [main]
    tags: ["v*"]
  schedule:
    # Check for upstream changes every 6 hours
    - cron: '0 */6 * * *'

env:
  IMAGE_NAME: nearaidev/ironclaw-dind

jobs:
  build:
    name: Build & Push (${{ matrix.variant }})
    runs-on: [self-hosted, sysbox]
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: stable
            ironclaw_image: nearaidev/ironclaw:latest
            extra_tag: latest
          - variant: dev
            ironclaw_image: nearaidev/ironclaw:dev
            extra_tag: dev
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine ironclaw image
        id: ironclaw
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && -n "${{ inputs.ironclaw_image }}" ]]; then
            echo "image=${{ inputs.ironclaw_image }}" >> "$GITHUB_OUTPUT"
          else
            echo "image=${{ matrix.ironclaw_image }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Should bake
        id: bake
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "enabled=${{ inputs.bake }}" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKER_REGISTRY_USER }}
          password: ${{ secrets.DOCKER_REGISTRY_TOKEN }}

      - name: Pull ironclaw image and detect version
        id: version
        run: |
          docker pull "${{ steps.ironclaw.outputs.image }}"
          VERSION=$(docker run --rm "${{ steps.ironclaw.outputs.image }}" --version | awk '{print $2}')
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Detected IronClaw ${VERSION}"

      - name: Get upstream digest
        id: digest
        run: |
          UPSTREAM_DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' "${{ steps.ironclaw.outputs.image }}" | cut -d@ -f2)
          echo "upstream=$UPSTREAM_DIGEST" >> "$GITHUB_OUTPUT"
          echo "Upstream digest: $UPSTREAM_DIGEST"

      - name: Check if rebuild needed (schedule only)
        id: check
        if: github.event_name == 'schedule'
        run: |
          CURRENT_DIGEST=""
          if docker pull "${{ env.IMAGE_NAME }}:${{ matrix.extra_tag }}" > /dev/null 2>&1; then
            CURRENT_DIGEST=$(docker inspect --format='{{index .Config.Labels "ironclaw.source.digest"}}' "${{ env.IMAGE_NAME }}:${{ matrix.extra_tag }}" 2>/dev/null || echo "")
          fi
          echo "Current source digest: ${CURRENT_DIGEST:-<none>}"
          echo "Upstream digest: ${{ steps.digest.outputs.upstream }}"
          if [[ "$CURRENT_DIGEST" == "${{ steps.digest.outputs.upstream }}" ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "No changes detected — skipping rebuild"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "Upstream changed — rebuilding"
          fi

      - name: Determine tag
        id: tag
        if: steps.check.outputs.skip != 'true'
        run: |
          if [[ -n "${{ inputs.tag }}" && "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ steps.version.outputs.version }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build DinD image
        if: steps.check.outputs.skip != 'true'
        run: |
          docker build \
            --build-arg IRONCLAW_IMAGE=${{ steps.ironclaw.outputs.image }} \
            --build-arg IRONCLAW_SOURCE_DIGEST=${{ steps.digest.outputs.upstream }} \
            -t ${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.tag }} \
            .

      - name: Build sandbox image and bake
        if: steps.check.outputs.skip != 'true' && steps.bake.outputs.enabled == 'true'
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          echo "==> Cloning ironclaw for sandbox build..."
          rm -rf /tmp/ironclaw-build
          # Try both tag formats: ironclaw-v0.23.0 (new) and v0.21.0 (old)
          if ! git clone --branch "ironclaw-v${VERSION}" --depth 1 \
            https://github.com/nearai/ironclaw.git /tmp/ironclaw-build 2>/dev/null; then
            if ! git clone --branch "v${VERSION}" --depth 1 \
              https://github.com/nearai/ironclaw.git /tmp/ironclaw-build; then
              echo "::warning::No tag found for ironclaw ${VERSION} — skipping bake"
              exit 0
            fi
          fi

          echo "==> Building sandbox image from Dockerfile.worker..."
          docker build \
            -f /tmp/ironclaw-build/Dockerfile.worker \
            -t ironclaw-sandbox:local \
            /tmp/ironclaw-build
          rm -rf /tmp/ironclaw-build

          echo "==> Saving sandbox tarball..."
          docker save ironclaw-sandbox:local -o /tmp/sandbox.tar

          SANDBOX_IMAGE_ID=$(docker inspect --format='{{.Id}}' ironclaw-sandbox:local)

          echo "==> Running bake script (sysbox)..."
          bash scripts/bake-inner-image.sh \
            "${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.tag }}" \
            /tmp/sandbox.tar \
            "${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.tag }}" \
            "$SANDBOX_IMAGE_ID" \
            "$IRONCLAW_VERSION"

          rm -f /tmp/sandbox.tar

      - name: Tag extra
        if: steps.check.outputs.skip != 'true'
        run: docker tag ${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.tag }} ${{ env.IMAGE_NAME }}:${{ matrix.extra_tag }}

      - name: Push
        if: steps.check.outputs.skip != 'true'
        run: |
          docker push ${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.tag }}
          docker push ${{ env.IMAGE_NAME }}:${{ matrix.extra_tag }}

      - name: Summary
        if: steps.check.outputs.skip != 'true'
        run: |
          {
            echo "## ironclaw-dind (${{ matrix.variant }})"
            echo ""
            echo "- tag: \`${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.tag }}\`"
            echo "- ${{ matrix.extra_tag }}: \`${{ env.IMAGE_NAME }}:${{ matrix.extra_tag }}\`"
            echo "- ironclaw: \`${{ steps.ironclaw.outputs.image }}\` (v${{ steps.version.outputs.version }})"
            echo "- source digest: \`${{ steps.digest.outputs.upstream }}\`"
            echo "- baked: \`${{ steps.bake.outputs.enabled }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Summary (skipped)
        if: steps.check.outputs.skip == 'true'
        run: |
          {
            echo "## ironclaw-dind (${{ matrix.variant }}) — skipped"
            echo ""
            echo "Upstream \`${{ steps.ironclaw.outputs.image }}\` digest unchanged."
          } >> "$GITHUB_STEP_SUMMARY"
