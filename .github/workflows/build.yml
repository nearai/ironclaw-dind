name: Build & Push

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag (default: dev)'
        required: false
        type: string
        default: dev
      base_image:
        description: 'Base worker image'
        required: false
        type: string
        default: nearaidev/ironclaw-nearai-worker:latest
      bake:
        description: 'Bake sandbox image into inner Docker'
        required: false
        type: boolean
        default: true
  push:
    branches: [main]
    tags: ["v*"]

env:
  IMAGE_NAME: nearaidev/ironclaw-dind

jobs:
  build:
    name: Build & Push
    runs-on: [self-hosted, sysbox]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine tag
        id: tag
        run: |
          if [[ -n "${{ inputs.tag }}" && "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          elif [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            echo "tag=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=dev" >> "$GITHUB_OUTPUT"
          fi

      - name: Determine base image
        id: base
        run: |
          if [[ -n "${{ inputs.base_image }}" && "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "image=${{ inputs.base_image }}" >> "$GITHUB_OUTPUT"
          else
            echo "image=nearaidev/ironclaw-nearai-worker:latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Should bake
        id: bake
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "enabled=${{ inputs.bake }}" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKER_REGISTRY_USER }}
          password: ${{ secrets.DOCKER_REGISTRY_TOKEN }}

      - name: Pull base image and detect ironclaw version
        id: version
        run: |
          docker pull "${{ steps.base.outputs.image }}"
          VERSION=$(docker run --rm --entrypoint ironclaw "${{ steps.base.outputs.image }}" --version | awk '{print $2}')
          echo "ironclaw_version=v${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Detected IronClaw v${VERSION}"

      - name: Build DinD image
        run: |
          docker build \
            --build-arg BASE_IMAGE=${{ steps.base.outputs.image }} \
            -t ${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.tag }} \
            .

      - name: Build sandbox image and bake
        if: steps.bake.outputs.enabled == 'true'
        run: |
          IRONCLAW_VERSION="${{ steps.version.outputs.ironclaw_version }}"

          echo "==> Cloning ironclaw ${IRONCLAW_VERSION} for sandbox build..."
          rm -rf /tmp/ironclaw-build
          git clone --branch "$IRONCLAW_VERSION" --depth 1 \
            https://github.com/nearai/ironclaw.git /tmp/ironclaw-build

          echo "==> Building sandbox image from Dockerfile.worker..."
          docker build \
            -f /tmp/ironclaw-build/Dockerfile.worker \
            -t ironclaw-sandbox:local \
            /tmp/ironclaw-build
          rm -rf /tmp/ironclaw-build

          echo "==> Saving sandbox tarball..."
          docker save ironclaw-sandbox:local -o /tmp/sandbox.tar

          SANDBOX_IMAGE_ID=$(docker inspect --format='{{.Id}}' ironclaw-sandbox:local)

          echo "==> Running bake script (sysbox)..."
          bash scripts/bake-inner-image.sh \
            "${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.tag }}" \
            /tmp/sandbox.tar \
            "${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.tag }}" \
            "$SANDBOX_IMAGE_ID" \
            "$IRONCLAW_VERSION"

          rm -f /tmp/sandbox.tar

      - name: Push
        run: docker push ${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.tag }}

      - name: Summary
        run: |
          {
            echo "## ironclaw-dind"
            echo ""
            echo "- tag: \`${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.tag }}\`"
            echo "- base: \`${{ steps.base.outputs.image }}\`"
            echo "- ironclaw: \`${{ steps.version.outputs.ironclaw_version }}\`"
            echo "- baked: \`${{ steps.bake.outputs.enabled }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
